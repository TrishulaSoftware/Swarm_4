textarea:focus{border-color:#58a6ff}
.btn{margin-top:10px;padding:8px 20px;background:#238636;border:none;border-radius:6px;color:#fff;font-weight:700;font-size:.82rem;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.btn:hover{background:#2ea043}
.hint{font-size:.7rem;color:#8b949e;margin-top:6px}

function parseRaw(text) {
  const lines = text.split('\n').map(l => l.trim());
  const data100 = [], dataHot = [];
  let isHot = false, i = 0;
  while (i < lines.length) {
    const l = lines[i];
    if (!l) { i++; continue; }
    if (l.includes('NO LONGER 100%')) { isHot = true; i++; continue; }
    // Expect: TEAM, Player, vs/@, OPP, Line, Odds, blank, Pct%, Streak
    const team = l;
    const player = lines[i+1] || '';
    const ha = lines[i+2] || '';
    const opp = lines[i+3] || '';
    const line = lines[i+4] || '';
    const odds = lines[i+5] || '';
    // skip blank at i+6
    const pctRaw = lines[i+7] || '';
    const streak = lines[i+8] || '';
    const pct = parseInt(pctRaw);
    if (player && odds && pctRaw.includes('%') && streak.includes('/')) {
      const rec = { team, player, ha, opp, line, odds, pct, streak };
      if (!isHot) data100.push(rec); else dataHot.push(rec);
      i += 9;
    } else { i++; }
  }
  return { data100, dataHot };
}

function pctCls(p) {
  if(p>=100) return 'p100';
  if(p>=94)  return 'p94';
  if(p>=90)  return 'p90';
  if(p>=89)  return 'p89';
  if(p>=87)  return 'p87';
  if(p>=86)  return 'p86';
  if(p>=85)  return 'p85';
  return 'p83';
}
function barCls(p) {
  if(p>=100) return 'b100';
  if(p>=90)  return 'b90';
  if(p>=86)  return 'b86';
  return 'b83';
}
function oddsHtml(o) {
  return `<span class="${o.startsWith('+') ? 'pos' : 'neg'}">${o}</span>`;
}
function streakNums(s) {
  const m = s.match(/(\d+)\/L(\d+)/);
  return m ? { hits: parseInt(m[1]), last: parseInt(m[2]) } : { hits:4, last:4 };
}

function buildTable(data) {
  if (!data.length) return '';
  const rows = data.map((d,i) => {
    const sn = streakNums(d.streak);
    const barW = Math.round((sn.hits / sn.last) * 100);
    return `<tr>
      <td style="color:#8b949e;font-size:.75rem">${i+1}</td>
      <td><span class="team">${d.team}</span></td>
      <td><span class="pname">${d.player}</span><br><span class="mu">${d.ha} ${d.opp}</span></td>
      <td class="mu">${d.line}</td>
      <td>${oddsHtml(d.odds)}</td>
      <td class="pct ${pctCls(d.pct)}">${d.pct}%</td>
      <td class="sc">${d.streak}</td>
      <td><div class="bw"><div class="bf ${barCls(d.pct)}" style="width:${barW}%"></div></div></td>
    </tr>`;
  }).join('');
  return `<table>
    <thead><tr>
      <th>#</th><th>Team</th><th>Player / Matchup</th>
      <th>Line</th><th>Odds</th><th>Hit%</th><th>Streak</th><th style="width:110px">Bar</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function render(data100, dataHot) {
  const best = data100.reduce((b,d) => {
    const n = streakNums(d.streak); return n.hits > b ? n.hits : b;
  }, 0);
  document.getElementById('statsRow').innerHTML = `
    <div class="sbox"><div class="v gold">${data100.length}</div><div class="l">100% Players</div></div>
    <div class="sbox"><div class="v green">${dataHot.length}</div><div class="l">Hot Streak Players</div></div>
    <div class="sbox"><div class="v blue">${data100.length + dataHot.length}</div><div class="l">Total Qualified</div></div>
    <div class="sbox"><div class="v gold">${best}/${best}</div><div class="l">Best Streak</div></div>`;

  document.getElementById('chartArea').innerHTML = `
    <div class="section-hdr gold">🏆 100% Streaks (${data100.length} players)</div>
    ${buildTable(data100)}
    <hr class="divline">
    <div class="section-hdr green" style="margin-top:20px">🔥 Hot Streaks 83–94% (${dataHot.length} players)</div>
    ${buildTable(dataHot)}`;
}

function parseAndRender() {
  const txt = document.getElementById('pasteBox').value.trim();
  if (!txt) return;
  const { data100, dataHot } = parseRaw(txt);
  render(data100, dataHot);
}

// Auto-render on load
const { data100, dataHot } = parseRaw(RAW);
render(data100, dataHot);
